<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Youssef &amp; Rowida — Wedding Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Parisienne&family=Cormorant:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FDF9F4;
    --cream-deep:#F5ECE3;
    --blush:#F4DFD8;
    --rose:#C79087;
    --rose-deep:#B07A70;
    --ink:#6E5D56;
    --ink-soft:#8B7A72;
    --gold:#C6A876;
    --gold-soft:#DCC59B;
    --bg:#F7EDE6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Cormorant Garamond',serif;
    background:
      radial-gradient(ellipse at 20% 6%, #FEFAF6 0%, transparent 50%),
      radial-gradient(ellipse at 85% 95%, #F1DAD1 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
  }
  img{display:block; max-width:100%;}

  /* ============================================================
     STAGE 1 — the sealed envelope, softly framed
     ============================================================ */
  #envelope-stage{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2rem;
    z-index:50;
    transition:opacity .8s ease, visibility .8s;
  }
  #envelope-stage.opening{opacity:0; visibility:hidden; pointer-events:none;}

  .envelope-scene{
    position:relative;
    width:min(400px, 74vw);
    display:flex; align-items:center; justify-content:center;
  }
  .envelope-scene.opening{ animation:envelopeAway .7s ease forwards; }
  @keyframes envelopeAway{ to{ transform:scale(.9) translateY(14px); opacity:0; } }

  .envelope-btn{
    all:unset; cursor:pointer; display:block; width:100%;
    border-radius:16px; position:relative; z-index:3;
    transition:transform .45s ease, filter .45s ease;
    filter:drop-shadow(0 18px 32px rgba(180,120,105,.22));
  }
  .envelope-btn:hover{ transform:translateY(-4px); }
  .envelope-btn:focus-visible{ outline:2px solid var(--rose); outline-offset:8px; border-radius:12px; }
  .envelope-btn img{ border-radius:12px; }

  .deco-flower{
    position:absolute; width:clamp(58px,13vw,96px); z-index:1;
    pointer-events:none; opacity:.55;
    mix-blend-mode:multiply;
    filter:saturate(.75);
  }
  .deco-flower.tl{ top:-10%; left:-24%; transform:rotate(-6deg); }
  .deco-flower.tr{ top:-10%; right:-24%; transform:scaleX(-1) rotate(-6deg); }
  .deco-flower.bl{ bottom:-12%; left:-22%; width:clamp(48px,11vw,80px); transform:scale(1,-1) rotate(-4deg); }
  .deco-flower.br{ bottom:-12%; right:-22%; width:clamp(48px,11vw,80px); transform:scale(-1,-1) rotate(-4deg); }

  .hint{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
    font-size:.92rem; letter-spacing:.08em;
    color:var(--rose-deep);
    animation:hintPulse 3s ease-in-out infinite;
  }
  @keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* ============================================================
     STAGE 2 — the letter
     ============================================================ */
  #letter-stage{
    position:relative;
    opacity:0; visibility:hidden;
    display:flex; justify-content:center;
    padding:clamp(1rem,4vw,3.5rem) 1rem 4.5rem;
    transition:opacity .6s ease, visibility .6s;
  }
  #letter-stage.active{opacity:1; visibility:visible;}

  .letter-frame{
    width:min(600px,100%);
    max-height:112px;
    overflow:hidden;
    border-radius:18px;
    box-shadow:0 26px 60px rgba(180,120,105,.20), 0 3px 10px rgba(180,120,105,.10);
    transition:max-height 1.15s cubic-bezier(.65,0,.32,1);
    position:relative;
  }
  .letter-frame.unfolded{ max-height:1500px; }

  .letter{
    position:relative;
    background:linear-gradient(180deg, var(--cream) 0%, var(--cream-deep) 100%);
    border:1px solid #EEDFD3;
    border-radius:18px;
    padding:clamp(3rem,8vw,4.6rem) clamp(1.6rem,7vw,3.8rem) clamp(3rem,8vw,4.8rem);
    text-align:center;
  }

  .crease{
    position:absolute; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(110,93,86,.18) 20%, rgba(110,93,86,.18) 80%, transparent);
    z-index:6; transition:opacity .5s ease .1s;
  }
  .crease-1{ top:33.3%; }
  .crease-2{ top:66.6%; }
  .letter-frame.unfolded .crease{ opacity:0; }

  .emblem-bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:contain; mix-blend-mode:multiply;
    opacity:.22; z-index:0; pointer-events:none;
  }

  .flourish{
    position:absolute; width:clamp(56px,12vw,92px); z-index:1;
    pointer-events:none; opacity:.5;
    mix-blend-mode:multiply;
  }
  .flourish.tl{ top:14px; left:14px; }
  .flourish.tr{ top:14px; right:14px; transform:scaleX(-1); }
  .flourish.bl{ bottom:14px; left:14px; transform:scale(1,-1); }
  .flourish.br{ bottom:14px; right:14px; transform:scale(-1,-1); }

  .content{ position:relative; z-index:2; }

  .reveal{opacity:0; transform:translateY(14px); transition:opacity .8s ease, transform .8s ease;}
  #letter-stage.content-visible .reveal{opacity:1; transform:none;}
  #letter-stage.content-visible .reveal:nth-child(2){transition-delay:.12s}
  #letter-stage.content-visible .reveal:nth-child(3){transition-delay:.26s}
  #letter-stage.content-visible .reveal:nth-child(4){transition-delay:.4s}
  #letter-stage.content-visible .reveal:nth-child(5){transition-delay:.54s}
  #letter-stage.content-visible .reveal:nth-child(6){transition-delay:.68s}
  #letter-stage.content-visible .reveal:nth-child(7){transition-delay:.82s}
  #letter-stage.content-visible .reveal:nth-child(8){transition-delay:.96s}

  .eyebrow{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
    font-size:clamp(.9rem,2.4vw,1.02rem);
    letter-spacing:.14em;
    color:var(--ink-soft);
  }
  .names{
    font-family:'Parisienne',cursive;
    font-weight:400;
    font-size:clamp(3rem,11vw,5.4rem);
    line-height:1.15;
    color:var(--rose-deep);
    margin:.9rem 0 .5rem;
  }
  .names .amp{ display:block; font-size:.4em; color:var(--gold); margin:.05em 0; }

  .invite-line{
    font-size:clamp(1.02rem,3vw,1.24rem);
    font-style:italic; font-weight:400;
    color:var(--ink);
    max-width:32ch; margin:0 auto;
    line-height:1.65;
  }

  .flower-divider{
    display:flex; align-items:center; justify-content:center; gap:1rem;
    margin:2rem auto 1.9rem;
    width:min(240px,72%);
  }
  .flower-divider .line{ flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--gold-soft)); }
  .flower-divider .line.right{ background:linear-gradient(90deg, var(--gold-soft), transparent); }
  .flower-divider img{ width:30px; opacity:.85; filter:saturate(.8); mix-blend-mode:multiply; }

  .when{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:.35rem;
  }
  .when .day{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
    font-size:clamp(.92rem,2.4vw,1.05rem);
    letter-spacing:.14em;
    color:var(--ink-soft);
  }
  .when .date-main{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2.4rem,7.6vw,3.4rem);
    font-weight:400; color:var(--ink);
    line-height:1.05;
  }
  .when .date-main .num{ color:var(--rose-deep); }
  .when .year{
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:400;
    font-size:clamp(.92rem,2.4vw,1.05rem);
    letter-spacing:.1em; color:var(--ink-soft);
  }
  .time-line{
    margin-top:.9rem;
    font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:500;
    font-size:clamp(1.02rem,2.8vw,1.16rem);
    letter-spacing:.06em;
    color:var(--rose-deep);
  }

  .venue{ margin-top:2.1rem; }
  .venue .venue-label{
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:.86rem; letter-spacing:.1em; color:var(--rose-deep);
  }
  .venue .venue-name{
    font-size:clamp(1.4rem,4.6vw,1.85rem);
    font-weight:500; letter-spacing:.02em;
    color:var(--ink); margin-top:.4rem;
  }
  .map-btn{
    display:inline-flex; align-items:center; gap:.55rem;
    margin-top:1.2rem;
    padding:.7rem 1.7rem;
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:.92rem; letter-spacing:.03em;
    color:#fff; text-decoration:none;
    background:linear-gradient(135deg, var(--rose) 0%, var(--rose-deep) 100%);
    border-radius:999px;
    box-shadow:0 8px 20px rgba(176,122,112,.28);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .map-btn:hover{ transform:translateY(-3px); box-shadow:0 12px 24px rgba(176,122,112,.36); }
  .map-btn:focus-visible{ outline:2px solid var(--ink); outline-offset:3px; }
  .map-btn svg{ width:13px; height:13px; }

  .closing-seal{
    margin-top:2.3rem;
    display:flex; flex-direction:column; align-items:center; gap:.6rem;
  }
  .closing-seal img{ width:42px; opacity:.8; mix-blend-mode:multiply; }
  .closing-seal .closing-text{
    font-family:'Parisienne',cursive; font-weight:400;
    font-size:clamp(1.3rem,4.2vw,1.7rem);
    color:var(--rose-deep);
  }

  .petal{
    position:fixed; top:-60px;
    width:16px; z-index:5; pointer-events:none;
    opacity:.55;
    mix-blend-mode:multiply;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{ transform:translateY(-8vh) translateX(0) rotate(0deg); }
    100%{ transform:translateY(112vh) translateX(40px) rotate(280deg); }
  }

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ transition-duration:.01ms !important; animation:none !important; }
    .petal{ display:none; }
    .reveal{ opacity:1; transform:none; }
  }
</style>
</head>

<script>
  const envelopeBtn   = document.getElementById('envelope-btn');
  const envelopeStage = document.getElementById('envelope-stage');
  const envelopeScene = document.getElementById('envelope-scene');
  const letterStage   = document.getElementById('letter-stage');
  const letterFrame   = document.getElementById('letter-frame');
  let opened = false;

  function openInvitation(){
    if(opened) return;
    opened = true;
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if(reduced){
      envelopeStage.classList.add('opening');
      letterStage.classList.add('active');
      letterFrame.classList.add('unfolded');
      letterStage.classList.add('content-visible');
      letterStage.setAttribute('aria-hidden','false');
      return;
    }

    envelopeScene.classList.add('opening');
    letterStage.classList.add('active');
    letterStage.setAttribute('aria-hidden','false');

    setTimeout(()=>{ envelopeStage.classList.add('opening'); }, 550);
    setTimeout(()=>{ letterFrame.classList.add('unfolded'); }, 500);
    setTimeout(()=>{
      letterStage.classList.add('content-visible');
      spawnPetals();
    }, 1550);
  }

  envelopeBtn.addEventListener('click', openInvitation);
  envelopeBtn.addEventListener('keydown', e=>{
    if(e.key==='Enter' || e.key===' '){ e.preventDefault(); openInvitation(); }
  });
